name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install OS‑specific tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xclip fzf

      - name: Install OS‑specific tools (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install fzf

      - name: Install OS‑specific tools (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y fzf

      - name: Run tests
        run: pytest -q

      - name: Build package
        if: matrix.os == 'ubuntu-22.04'
        run: |
          python -m build
          python -m twine check dist/*
